name: 'Lint Prisma migrations action'
description: 'Lints Prisma migrations and/or flat-key i18n JSON files'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  prisma-migrations-path:
    description: 'Path to the Prisma migrations directory'
    required: false
  prisma-migrations-ignore:
    description: 'A list of migration names to ignore'
    required: false
  prisma-migrations-rules:
    description: 'The list of rules you would like to run'
    required: false
  i18n-path:
    description: 'Path to the i18n directory containing locale JSON files'
    required: false
outputs:
  prisma-migrations-files-analyzed:
    description: 'The number of Prisma migration files analyzed'
  i18n-files-analyzed:
    description: 'The number of i18n JSON files analyzed'
runs:
  using: 'node20'
  main: 'dist/index.js'
