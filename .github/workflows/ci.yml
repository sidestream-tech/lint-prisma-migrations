name: 'test'
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '24.14.0'
  PNPM_VERSION: '10.32.1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  integration-prisma-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test all rules
        uses: ./
        with:
          prisma-migrations-path: './stubs/prisma-migrations/all_rules'

      - name: Test ignore option
        uses: ./
        with:
          prisma-migrations-path: './stubs/prisma-migrations/all_rules'
          prisma-migrations-ignore: |
            20250101000000_should_work
            20240101000000_should_also_work

      - name: Test only name rules
        uses: ./
        with:
          prisma-migrations-path: './stubs/prisma-migrations/name_rules'
          prisma-migrations-rules: |
            date
            format

      - name: Test only file rules
        uses: ./
        with:
          prisma-migrations-path: './stubs/prisma-migrations/files_rules'
          prisma-migrations-rules: |
            missing
            link
            transaction

  integration-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test valid i18n files
        uses: ./
        with:
          i18n-path: './stubs/i18n/valid'

  integration-combined:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test both linters together
        uses: ./
        with:
          prisma-migrations-path: './stubs/prisma-migrations/all_rules'
          i18n-path: './stubs/i18n/valid'
